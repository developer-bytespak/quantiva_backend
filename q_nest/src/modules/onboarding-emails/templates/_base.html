<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light only" />
    <title>QuantivaHQ</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4f4f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; color: #111827; -webkit-font-smoothing: antialiased;">
    <div style="display: none; max-height: 0; overflow: hidden; opacity: 0; visibility: hidden; mso-hide: all; font-size: 1px; line-height: 1px; color: #f4f4f7;">
      QuantivaHQ — smarter trading, powered by data.
    </div>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f4f7;">
      <tr>
        <td align="center" style="padding: 32px 16px;">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width: 100%; max-width: 600px; background: #ffffff; border-radius: 14px; overflow: hidden;">

            <tr>
              <td style="padding: 28px 36px 16px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="padding-right: 10px; vertical-align: middle; line-height: 0;">
                      <img src="{{frontendUrl}}/email-assets/icon.png" width="28" height="28" alt="" style="display: block; border: 0;" />
                    </td>
                    <td style="vertical-align: middle;">
                      <span style="font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fc4f02;">Quantiva<span style="color: #fda300;">HQ</span></span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 36px;">
                {{hero}}
              </td>
            </tr>

            <tr>
              <td style="padding: 28px 36px 8px;">
                {{body}}
              </td>
            </tr>

            <tr>
              <td style="padding: 28px 36px 24px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background: #f3f4f6; border-radius: 10px;">
                  <tr>
                    <td style="padding: 16px 18px;">
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                        <tr>
                          <td style="padding-right: 12px; vertical-align: middle; line-height: 0;">
                            <!--[if !mso]><!-->
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block;" aria-hidden="true">
                              <rect x="2.5" y="5" width="19" height="14" rx="2" stroke="#111827" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                              <path d="M3 6.5l9 6 9-6" stroke="#111827" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <!--<![endif]-->
                            <!--[if mso]>
                            <span style="font-family: Arial, sans-serif; font-size: 18px; color: #111827;">&#9993;</span>
                            <![endif]-->
                          </td>
                          <td style="vertical-align: middle;">
                            <div style="font-size: 14px; color: #111827; font-weight: 600; line-height: 1.4;">Have a question?</div>
                            <div style="font-size: 14px; color: #4b5563; line-height: 1.4; margin-top: 2px;">
                              <a href="mailto:support@quantivahq.com" style="color: #fc4f02; text-decoration: underline; font-weight: 500;">Reach out to our team</a>
                            </div>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 36px;">
                <div style="height: 1px; background: #111827; line-height: 1px; font-size: 0;">&nbsp;</div>
              </td>
            </tr>

            <tr>
              <td style="padding: 20px 36px 24px; text-align: center;">
                <p style="margin: 0 0 6px 0; font-size: 12px; color: #9ca3af; line-height: 1.5;">
                  Quantiva, Inc. · 21825 Erwin St. #1020, Woodland Hills, CA 91367
                </p>
                <p style="margin: 0; font-size: 11px; color: #9ca3af;">
                  <a href="{{unsubscribeUrl}}" style="color: #9ca3af; text-decoration: underline;">Unsubscribe</a>
                  &nbsp;·&nbsp;
                  &copy; 2026 Quantiva, Inc.
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
